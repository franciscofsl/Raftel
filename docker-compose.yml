version: "3.7"

networks:
  raftel-network:

services:
  sqlserver:
    image: "mcr.microsoft.com/mssql/server"
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "SqlServer_Docker2023"
      ACCEPT_EULA: "Y"
    networks:
      - raftel-network
    
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    hostname: azurite
    restart: always
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

volumes:
  azurite_data:
